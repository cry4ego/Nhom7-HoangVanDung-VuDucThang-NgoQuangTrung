<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Hỗ trợ khách hàng</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 450px; height: 650px;
            background: #fff; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #7C7BAD;
            color: #fff; padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .chat-header .avatar {
            width: 40px; height: 40px; background: #fff;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 20px;
        }
        .chat-header h3 { font-size: 16px; font-weight: 600; }
        .chat-header p { font-size: 12px; opacity: 0.85; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
            background: #f7f8fc;
        }
        .message {
            max-width: 80%; padding: 10px 14px;
            border-radius: 12px; font-size: 14px;
            line-height: 1.5; word-wrap: break-word;
        }
        .message.bot {
            background: #fff; color: #333;
            align-self: flex-start;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
        }
        .message.user {
            background: #7C7BAD; color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.typing {
            background: #fff; border: 1px solid #e8e8e8;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
        .typing-dots span {
            width: 8px; height: 8px; background: #999;
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .chat-input {
            padding: 12px 16px; background: #fff;
            border-top: 1px solid #eee;
            display: flex; gap: 8px;
        }
        .chat-input input {
            flex: 1; padding: 10px 14px;
            border: 1px solid #ddd; border-radius: 24px;
            font-size: 14px; outline: none;
        }
        .chat-input input:focus { border-color: #7C7BAD; }
        .chat-input button {
            width: 40px; height: 40px; border: none;
            background: #7C7BAD; color: #fff;
            border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex;
            align-items: center; justify-content: center;
        }
        .chat-input button:hover { background: #6b6a9d; }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; }
        .suggestions {
            padding: 8px 16px; background: #f7f8fc;
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .suggestions button {
            padding: 6px 12px; border: 1px solid #7C7BAD;
            background: #fff; color: #7C7BAD;
            border-radius: 16px; font-size: 12px;
            cursor: pointer;
        }
        .suggestions button:hover { background: #7C7BAD; color: #fff; }
        .response-time {
            font-size: 11px; color: #999;
            margin-top: 2px; align-self: flex-start;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div>
                <h3>AI Chatbot</h3>
                <p>Hỗ trợ khách hàng 24/7</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                Xin chào! Tôi là trợ lý AI. Tôi có thể giúp bạn tra cứu thông tin về đơn hàng, khách hàng, sản phẩm, công việc và nhân viên. Hãy hỏi tôi bất cứ điều gì!
            </div>
        </div>

        <div class="suggestions">
            <button onclick="sendSuggestion('Cho tôi xem danh sách đơn hàng')">📦 Đơn hàng</button>
            <button onclick="sendSuggestion('Danh sách khách hàng')">👥 Khách hàng</button>
            <button onclick="sendSuggestion('Tiến độ công việc hiện tại')">📋 Công việc</button>
            <button onclick="sendSuggestion('Danh sách nhân viên đang làm việc')">👨‍💼 Nhân viên</button>
            <button onclick="sendSuggestion('Sản phẩm và giá')">🛍️ Sản phẩm</button>
        </div>

        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Nhập câu hỏi..."
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const SESSION_ID = 'web_' + Date.now();
        const API_URL = '/chatbot/api/chat';

        function addMessage(text, type) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function addTyping() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function addResponseTime(seconds) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'response-time';
            div.textContent = `⏱ ${seconds.toFixed(1)}s`;
            container.appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage(text, 'user');

            document.getElementById('sendBtn').disabled = true;
            addTyping();

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        method: 'call',
                        params: { message: text, session_id: SESSION_ID }
                    })
                });
                const data = await resp.json();
                removeTyping();

                if (data.result && data.result.success) {
                    addMessage(data.result.response, 'bot');
                    if (data.result.metadata && data.result.metadata.response_time) {
                        addResponseTime(data.result.metadata.response_time);
                    }
                } else {
                    addMessage('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại.', 'bot');
                }
            } catch (err) {
                removeTyping();
                addMessage('Không thể kết nối đến server. Vui lòng kiểm tra lại.', 'bot');
            }

            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function sendSuggestion(text) {
            document.getElementById('msgInput').value = text;
            sendMessage();
        }
    </script>
</body>
</html>
